name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/run_lint.ps1

      - name: Tests
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/run_tests.ps1

